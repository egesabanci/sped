name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  RUFF_OUTPUT_FORMAT: "github"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: uv sync --group dev
      - name: Check formatting
        run: uv run ruff format --check sped/
      - name: Lint
        run: uv run ruff check sped/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --group dev
      - name: Run tests (fast)
        run: uv run pytest tests/ -v -m "not slow" -x --tb=short
      - name: Run slow tests
        run: uv run pytest tests/ -v -m "slow" -x --tb=short --run-slow
        continue-on-error: true
      - name: Test CLI entry point
        run: uv run sped version
